    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h2>Projeção Ortogonal (Sombra)</h2>
        <div class="controls">
            <button onclick="changeShape('cilindro')" id="btn-cilindro" class="active">Cilindro</button>
            <button onclick="changeShape('cone')" id="btn-cone">Cone</button>
            <button onclick="changeShape('cubo')" id="btn-cubo">Cubo</button>
            <button onclick="changeShape('piramide')" id="btn-piramide">Pirâmide</button>
        </div>
        
        <div class="slider-group">
            <label>Girar no Eixo X (Tombar para frente/trás)</label>
            <input type="range" id="rotX" min="0" max="90" value="0" oninput="updateRotation()">
        </div>
        <div class="slider-group">
            <label>Girar no Eixo Z (Tombar para os lados)</label>
            <input type="range" id="rotZ" min="0" max="90" value="0" oninput="updateRotation()">
        </div>

        <div id="status">Sombra atual: Círculo</div>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x34495e); // Fundo escuro estúdio

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 15, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // LIGA AS SOMBRAS
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // LUZ DO "SOL DO MEIO-DIA" (Direcional, reta para baixo)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(0, 20, 0); // Exatamente no teto
        dirLight.target.position.set(0, 0, 0);
        dirLight.castShadow = true;
        // Ajustando a qualidade da sombra
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);
        scene.add(dirLight.target);

        // O CHÃO (Palco)
        const planeGeo = new THREE.PlaneGeometry(30, 30);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0xecf0f1 });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.receiveShadow = true; // RECEBE A SOMBRA
        scene.add(plane);

        // Grade para ajudar na perspectiva
        const grid = new THREE.GridHelper(30, 30, 0xbdc3c7, 0xbdc3c7);
        grid.position.y = 0.01;
        scene.add(grid);

        // MATERIAIS DOS SÓLIDOS
        const matSolid = new THREE.MeshStandardMaterial({ color: 0x3498db, roughness: 0.3 });

        // GEOMETRIAS
        const shapes = {
            'cilindro': new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 6, 32), matSolid),
            'cone': new THREE.Mesh(new THREE.ConeGeometry(2.5, 6, 32), matSolid),
            'cubo': new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), matSolid),
            'piramide': new THREE.Mesh(new THREE.CylinderGeometry(0, 3, 5, 4), matSolid) // Pirâmide base quadrada
        };

        // Configura todos os sólidos
        let currentShapeMesh = null;
        for (let key in shapes) {
            shapes[key].castShadow = true;
            shapes[key].position.y = 5; // Suspende no ar
            
            // Ajuste especial para a pirâmide ficar alinhada com os eixos
            if(key === 'piramide') shapes[key].rotation.y = Math.PI / 4; 
        }

        // FUNÇÕES DE CONTROLE
        function changeShape(shapeName) {
            // Atualiza botões
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + shapeName).classList.add('active');

            // Remove a forma antiga da cena
            if (currentShapeMesh) scene.remove(currentShapeMesh);

            // Adiciona a nova forma
            currentShapeMesh = shapes[shapeName];
            scene.add(currentShapeMesh);

            // Reseta a rotação e os sliders
            document.getElementById('rotX').value = 0;
            document.getElementById('rotZ').value = 0;
            updateRotation();
        }

        function updateRotation() {
            if (!currentShapeMesh) return;
            
            const xDeg = document.getElementById('rotX').value;
            const zDeg = document.getElementById('rotZ').value;
            
            // Converte para radianos
            currentShapeMesh.rotation.x = xDeg * (Math.PI / 180);
            currentShapeMesh.rotation.z = zDeg * (Math.PI / 180);

            // Se for a pirâmide, mantém o ajuste de Y
            if (currentShapeMesh.geometry.type === 'CylinderGeometry' && currentShapeMesh.geometry.parameters.radialSegments === 4) {
                currentShapeMesh.rotation.y = Math.PI / 4;
            }

            updateStatusText(xDeg, zDeg);
        }

        function updateStatusText(x, z) {
            const status = document.getElementById('status');
            const shapeId = document.querySelector('.controls button.active').id.replace('btn-', '');
            
            let text = "Observando a Sombra...";
            
            // Lógica simples para dar feedback sobre a forma da sombra
            if (x == 0 && z == 0) {
                if (shapeId === 'cilindro' || shapeId === 'cone') text = "A sombra é um CÍRCULO perfeito.";
                if (shapeId === 'cubo' || shapeId === 'piramide') text = "A sombra é um QUADRADO.";
            } else if (x == 90 || z == 90) {
                if (shapeId === 'cilindro') text = "A sombra é um RETÂNGULO.";
                if (shapeId === 'cone' || shapeId === 'piramide') text = "A sombra é um TRIÂNGULO.";
                if (shapeId === 'cubo') text = "A sombra continua sendo um QUADRADO.";
            } else {
                text = "A sombra é uma figura de transição (achatada).";
            }
            
            status.innerText = text;
        }

        // Inicializa
        changeShape('cilindro');

        // Loop de Renderização
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Responsividade
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
