    <div id="canvas-container"></div>

    <div id="ui-panel">
        <div class="controls">
            <button onclick="changePosition(0)" id="btn-0" class="active">Reta Contida</button>
            <button onclick="changePosition(1)" id="btn-1">Reta Concorrente</button>
            <button onclick="changePosition(2)" id="btn-2">Reta Paralela</button>
        </div>
        <div id="description">Carregando...</div>
    </div>

    <script>
        const descriptions = [
            "<strong>Reta Contida no Plano:</strong> Todos os pontos da reta pertencem ao plano. Têm infinitos pontos em comum. <br><i>Exemplo: Uma linha desenhada numa folha de papel.</i>",
            "<strong>Reta Concorrente (Secante):</strong> A reta fura o plano em um único ponto. <br><i>Exemplo: Um lápis atravessando uma folha de papel.</i>",
            "<strong>Reta Paralela ao Plano:</strong> A reta e o plano não possuem nenhum ponto em comum. <br><i>Exemplo: Uma caneta segurada acima da mesa, perfeitamente horizontal.</i>"
        ];

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f7f6);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(12, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // Plano Base
        const planeGeo = new THREE.PlaneGeometry(12, 12);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x4cd137, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        // Borda do plano
        const edges = new THREE.EdgesGeometry(planeGeo);
        const lineSegments = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x333333 }));
        plane.add(lineSegments);

        // Reta
        const lineGeo = new THREE.CylinderGeometry(0.06, 0.06, 16, 16);
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xe84118 });
        const line = new THREE.Mesh(lineGeo, lineMat);
        scene.add(line);

        // Ponto de Intersecção (para modo concorrente)
        const pointGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const pointMat = new THREE.MeshBasicMaterial({ color: 0xfbc531 });
        const point = new THREE.Mesh(pointGeo, pointMat);
        scene.add(point);

        function changePosition(index) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + index).classList.add('active');
            document.getElementById('description').innerHTML = descriptions[index];

            point.visible = false;

            if (index === 0) { // Contida
                line.rotation.set(0, 0, Math.PI / 2);
                line.position.set(0, 0.05, 0);
            } else if (index === 1) { // Concorrente
                line.rotation.set(Math.PI / 4, 0, 0);
                line.position.set(0, 0, 0);
                point.visible = true;
            } else if (index === 2) { // Paralela
                line.rotation.set(0, 0, Math.PI / 2);
                line.position.set(0, 3, 0);
            }
        }

        changePosition(0);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
