    <div class="instrucao">
        💡 <b>Dica Matmov:</b><br>
        Clique e arraste para girar. Conte os blocos e quadrados!
    </div>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h2>Medidas Geométricas</h2>
        <div class="controls">
            <button onclick="changeMode(0)" id="btn-0" class="active">Perímetro (1D)</button>
            <button onclick="changeMode(1)" id="btn-1">Área (2D)</button>
            <button onclick="changeMode(2)" id="btn-2">Volume (3D)</button>
        </div>
        <div id="description" class="desc-perimetro">Carregando...</div>
    </div>

    <script>
        const descriptions = [
            "<strong>Perímetro: O Contorno (A Cerca)</strong><br>Mede apenas a linha ao redor. É uma medida unidimensional (1D).<br><b style='color:#e84118'>Soma dos lados = 3 + 4 + 3 + 4 = 14 metros.</b>",
            "<strong>Área: A Superfície (O Piso)</strong><br>Mede o preenchimento do chão plano. É bidimensional (2D).<br><b style='color:#4cd137'>Base x Altura = 3 x 4 = 12 metros quadrados (m²).</b><br><i>(Conte os 12 quadradinhos no chão!)</i>",
            "<strong>Volume: O Espaço (A Piscina/Prédio)</strong><br>Mede a capacidade ou o espaço ocupado. É tridimensional (3D).<br><b style='color:#00a8ff'>Área da Base x Profundidade = 12 x 3 = 36 metros cúbicos (m³).</b><br><i>(São 36 cubinhos empilhados!)</i>"
        ];

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f7f6);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(10, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Grade de fundo suave
        const gridHelper = new THREE.GridHelper(20, 20, 0xdddddd, 0xeeeeee);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // Dimensões do nosso objeto de estudo
        const width = 4;
        const depth = 3;
        const height = 3;

        const groupPerimetro = new THREE.Group();
        const groupArea = new THREE.Group();
        const groupVolume = new THREE.Group();

        // 1. PERÍMETRO (Tubos formando as bordas)
        const matPerimetro = new THREE.MeshBasicMaterial({ color: 0xe84118 });
        
        // Bordas horizontais (X)
        const edge1 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, width, 8), matPerimetro);
        edge1.rotation.z = Math.PI / 2; edge1.position.set(0, 0, depth/2);
        const edge2 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, width, 8), matPerimetro);
        edge2.rotation.z = Math.PI / 2; edge2.position.set(0, 0, -depth/2);
        
        // Bordas de profundidade (Z)
        const edge3 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, depth, 8), matPerimetro);
        edge3.rotation.x = Math.PI / 2; edge3.position.set(width/2, 0, 0);
        const edge4 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, depth, 8), matPerimetro);
        edge4.rotation.x = Math.PI / 2; edge4.position.set(-width/2, 0, 0);

        groupPerimetro.add(edge1, edge2, edge3, edge4);


        // 2. ÁREA (Quadradinhos no chão)
        const matArea = new THREE.MeshStandardMaterial({ color: 0x4cd137, transparent: true, opacity: 0.8 });
        const matAreaEdge = new THREE.LineBasicMaterial({ color: 0x27ae60, linewidth: 2 });
        const planeGeo = new THREE.PlaneGeometry(0.95, 0.95); // Ligeiramente menor que 1 para ver as divisões
        
        for (let x = 0; x < width; x++) {
            for (let z = 0; z < depth; z++) {
                const tile = new THREE.Mesh(planeGeo, matArea);
                tile.rotation.x = -Math.PI / 2;
                // Centraliza o grid em relação ao (0,0,0)
                tile.position.set(x - width/2 + 0.5, 0, z - depth/2 + 0.5);
                groupArea.add(tile);
            }
        }


        // 3. VOLUME (Cubinhos empilhados)
        const matVolume = new THREE.MeshStandardMaterial({ color: 0x00a8ff, transparent: true, opacity: 0.85 });
        const boxGeo = new THREE.BoxGeometry(0.95, 0.95, 0.95);
        const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1));
        const matEdgeVolume = new THREE.LineBasicMaterial({ color: 0x0097e6 });

        for (let x = 0; x < width; x++) {
            for (let z = 0; z < depth; z++) {
                for (let y = 0; y < height; y++) {
                    const cube = new THREE.Mesh(boxGeo, matVolume);
                    cube.position.set(x - width/2 + 0.5, y + 0.5, z - depth/2 + 0.5);
                    
                    // Arestas para dar estilo bloco
                    const cubeEdges = new THREE.LineSegments(edgesGeo, matEdgeVolume);
                    cube.add(cubeEdges);
                    
                    groupVolume.add(cube);
                }
            }
        }

        scene.add(groupPerimetro);
        scene.add(groupArea);
        scene.add(groupVolume);

        function changeMode(index) {
            // Atualiza botões
            for(let i=0; i<=2; i++) {
                document.getElementById('btn-'+i).classList.remove('active');
            }
            document.getElementById('btn-'+index).classList.add('active');

            // Atualiza texto e classe de cor
            const desc = document.getElementById('description');
            desc.innerHTML = descriptions[index];
            desc.className = index === 0 ? 'desc-perimetro' : index === 1 ? 'desc-area' : 'desc-volume';

            // Visibilidade
            groupPerimetro.visible = false;
            groupArea.visible = false;
            groupVolume.visible = false;

            if(index === 0) groupPerimetro.visible = true;
            if(index === 1) {
                groupPerimetro.visible = true; // Mostra a borda também na área
                groupArea.visible = true;
            }
            if(index === 2) groupVolume.visible = true;
        }

        // Inicializa
        changeMode(0);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
