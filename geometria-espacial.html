<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geometria Espacial — Matmov</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f1623;
      color: #c8daf5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: rgba(20, 30, 50, 0.97);
      border-bottom: 1px solid rgba(126,184,247,0.2);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      overflow-x: auto;
      scrollbar-width: none;
    }
    header::-webkit-scrollbar { display: none; }

    .header-title {
      color: #7eb8f7;
      font-weight: 700;
      font-size: 0.85rem;
      white-space: nowrap;
      letter-spacing: 0.5px;
      margin-right: 8px;
    }

    .nav-links {
      display: flex;
      gap: 4px;
    }

    .nav-btn {
      color: #c8daf5;
      background: transparent;
      border: 1px solid transparent;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .nav-btn:hover {
      background: rgba(126,184,247,0.18);
      color: #fff;
      border-color: rgba(126,184,247,0.35);
    }
    .nav-btn.active {
      background: rgba(126,184,247,0.28);
      color: #fff;
      border-color: rgba(126,184,247,0.55);
      font-weight: 600;
    }

    #frame-container {
      flex: 1;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Landing screen shown before any page is selected */
    #landing {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: #0f1623;
    }
    #landing h1 {
      font-size: 2rem;
      color: #7eb8f7;
      letter-spacing: 1px;
    }
    #landing p {
      color: #6a8aad;
      font-size: 0.95rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      max-width: 860px;
      padding: 0 24px;
    }
    .card {
      background: rgba(126,184,247,0.07);
      border: 1px solid rgba(126,184,247,0.2);
      border-radius: 10px;
      padding: 18px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      text-align: center;
    }
    .card:hover {
      background: rgba(126,184,247,0.15);
      border-color: rgba(126,184,247,0.5);
      transform: translateY(-2px);
    }
    .card .num {
      font-size: 0.7rem;
      color: #7eb8f7;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .card .label {
      font-size: 0.9rem;
      color: #c8daf5;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <span class="header-title">Geometria Espacial ▸</span>
  <div class="nav-links" id="nav-links"></div>
</header>

<div id="frame-container">
  <div id="landing">
    <h1>Geometria Espacial</h1>
    <p>Selecione uma aula no menu acima ou abaixo para começar.</p>
    <div class="card-grid" id="card-grid"></div>
  </div>
  <iframe id="content-frame" src="" style="display:none;"></iframe>
</div>

<script>
  const pages = [
    { file: "001_geometria_espacial_3d.html",                        label: "Dimensões 3D",   num: "001" },
    { file: "002_geometria_espacial_postulados.html",                 label: "Postulados",     num: "002" },
    { file: "003_geometria_espacial_determinacao.html",               label: "Determinação",   num: "003" },
    { file: "004_geometria_espacial_posicoes_relativas.html",         label: "Pos. Relativas", num: "004" },
    { file: "005_geometria_espacial_retas_no_cubo.html",              label: "Retas no Cubo",  num: "005" },
    { file: "006_geometria_espacial_posicoes_relativas_planos.html",  label: "Planos",         num: "006" },
    { file: "007_geometria_espacial_posicoes_relativas_reta_plano.html", label: "Reta e Plano", num: "007" },
    { file: "008_geometria_espacial_sombra_projecoes.html",           label: "Sombras",        num: "008" },
    { file: "010_desafio_sombra.html",                                label: "Desafio Sombra", num: "010" },
    { file: "011_desafio_planificacao.html",                          label: "Planificação",   num: "011" },
    { file: "012_perimetro_area_volume.html",                         label: "Área e Volume",  num: "012" },
  ];

  const BASE = "geometria-espacial/";
  const frame = document.getElementById('content-frame');
  const landing = document.getElementById('landing');
  const navLinks = document.getElementById('nav-links');
  const cardGrid = document.getElementById('card-grid');

  let activeBtn = null;

  function loadPage(page, btn) {
    frame.src = BASE + page.file;
    frame.style.display = 'block';
    landing.style.display = 'none';
    if (activeBtn) activeBtn.classList.remove('active');
    btn.classList.add('active');
    activeBtn = btn;
  }

  pages.forEach(page => {
    // Nav button
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = page.label;
    btn.addEventListener('click', () => loadPage(page, btn));
    navLinks.appendChild(btn);

    // Landing card
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="num">${page.num}</div><div class="label">${page.label}</div>`;
    card.addEventListener('click', () => { loadPage(page, btn); });
    cardGrid.appendChild(card);
  });
</script>
</body>
</html>
